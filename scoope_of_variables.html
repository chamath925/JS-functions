<!DOCTYPE HTML>
<html>

<head>
    <title>Scope of variables</title>
</head>

<body>
    <p>A function can access variables declared inside it</p>
    <button onclick="myfunction()">Execute JS function</button>
    <p id="demo"></p>
    <P id="demo1"></P>
    <script>
        var b = 5
        function myfunction() {
            a = 4;
            document.getElementById("demo").innerHTML = b * a;
        }
        document.getElementById("demo1").innerHTML = a;
        document.getElementById("demo2").innerHTML = b;  
    </script>
</body>

</html>
